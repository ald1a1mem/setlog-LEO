const timeLinks = [
];

<style>
/* 🎨 全域基礎樣式（深色背景） */
body { 
  background: #111; 
  color: white; 
  text-align: center; 
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
  margin: 0; 
  overflow-x: hidden; 
}

/* 🌟 主題顏色設定（可自由修改喜歡的按鈕顏色） */
:root { 
  --main-color: #5698c3; 
}

/* 🔝 標題與字幕控制區（完美對照 image_9d9cc5.jpg 結構） */
#title { 
  font-size: 28px; 
  margin: 20px auto 15px auto; 
  font-weight: bold; 
  line-height: 1.5; 
  max-width: 95%; 
}

#subtitle-controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 20px;
}

/* 🎬 核心外層大框框：寬度限制為影片寬度，使其完美居中 */
#main-layout {
  position: relative;
  max-width: 640px; 
  margin: 0 auto;
  padding: 0 15px;
}

#video-wrapper { 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  width: 100%; 
}

/* 🎥 影片容器 */
#video-container { 
  position: relative; 
  width: 100%; 
  aspect-ratio: 16 / 9; 
  background: black; 
  border-radius: 10px; 
  overflow: hidden; 
}
#player, #player iframe { 
  width: 100%; 
  height: 100%; 
  display: block; 
}

/* 💬 浮動字幕樣式 */
#subtitle { 
  position: absolute; 
  bottom: 12%; 
  left: 50%; 
  transform: translateX(-50%); 
  font-size: 24px; /* 配合 70% 原始大小的體感字級 */
  color: white; 
  background: rgba(0,0,0,0.65); 
  padding: 8px 20px; 
  border-radius: 8px; 
  white-space: pre-line; 
  max-width: 70%; /* 限制字幕最大寬度為原始大小的 70% */
  width: fit-content; 
  pointer-events: none; 
  z-index: 10; 
  line-height: 1.4; 
  display: none;
  transition: font-size 0.2s ease;
}

/* 🎯 底部控制列（影片下方只留下全螢幕按鈕） */
#bottom-block { 
  width: 100%; 
  margin-top: 20px; 
  margin-bottom: 35px; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
}

/* 按鈕通用樣式（完美還原亮藍色風格） */
.btn {
  background: var(--main-color); 
  color: white; 
  border: none; 
  padding: 8px 22px; 
  border-radius: 6px; 
  cursor: pointer; 
  font-weight: bold; 
  transition: 0.3s; 
  font-size: 15px;
}
.btn:hover {
  filter: brightness(1.1);
}

/* 主按鈕（全螢幕）加寬加厚 */
#fullscreenBtn { 
  padding: 10px 35px;
  font-size: 16px;
}

/* 🚪 進入全螢幕後在畫面右下方顯示的「退出全螢幕」按鈕 */
#exitFullscreenBtn {
  display: none; 
  position: absolute;
  right: 20px;
  bottom: 20px;
  z-index: 20; 
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.4);
}
#exitFullscreenBtn:hover {
  background: rgba(0, 0, 0, 0.8);
}
/* 當偵測到全螢幕狀態時，自動強制顯示該按鈕 */
#video-container:fullscreen #exitFullscreenBtn,
#video-container:-webkit-full-screen #exitFullscreenBtn {
  display: block !important;
}

/* 📜 右側獨立時間軸選單 */
#timeline-sidebar {
  position: absolute;
  left: 680px;      /* 將側欄推到置中影片的右側 (640px 影片 + 40px 間距) */
  top: 0;
  width: 280px;
  height: 360px;    /* 高度與影片等高 */
  background: #222;
  border-radius: 10px;
  padding: 15px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto; /* 超過高度自動出現滾動條 */
  text-align: left;
}

#sidebar-title {
  font-size: 16px;
  font-weight: bold;
  color: var(--main-color);
  margin-bottom: 5px;
  border-bottom: 1px solid #444;
  padding-bottom: 8px;
}
#timeline-controls {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* 📜 美化側欄滾動條 */
#timeline-sidebar::-webkit-scrollbar { width: 6px; }
#timeline-sidebar::-webkit-scrollbar-track { background: #222; }
#timeline-sidebar::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
#timeline-sidebar::-webkit-scrollbar-thumb:hover { background: var(--main-color); }

/* 📱 RWD 行動裝置自動適應 */
@media (max-width: 1024px) {
  #main-layout { max-width: min(95vw, 640px); }
  #timeline-sidebar {
    position: static; 
    width: 100%;
    height: auto;
    margin-top: 20px;
  }
}
</style>
</head>

<body>

<!-- 標題區 -->
<div id="title">ASEA + 延世大學校友會 Vlog - by LEO</div>

<!-- 字幕控制按鈕區（移至影片上方） -->
<div id="subtitle-controls">
  <button class="btn" onclick="adjustSubtitle(4)">放大</button>
  <button class="btn" onclick="adjustSubtitle(-4)">縮小</button>
  <button class="btn" onclick="resetSubtitle()">復原</button>
</div>

<!-- 主版面區塊 -->
<div id="main-layout">
  
  <!-- 左側/中央：影片主體 -->
  <div id="video-wrapper">
    <div id="video-container">
      <div id="player"></div>
      <div id="subtitle"></div>
      <!-- 全螢幕模式下才會跑出來的退出按鈕 -->
      <button id="exitFullscreenBtn" class="btn" onclick="exitFullScreen()">退出全螢幕</button>
    </div>
    
    <!-- 影片底部：僅留全螢幕按鈕 -->
    <div id="bottom-block">
      <button id="fullscreenBtn" class="btn" onclick="enterFullScreen()">全螢幕</button>
    </div>
  </div>

  <!-- 右側：獨立時間軸 -->
  <div id="timeline-sidebar">
    <div id="sidebar-title">🕒 時間軸目錄</div>
    <div id="timeline-controls"></div>
  </div>

</div>

<!-- ⚙️ 核心 YouTube API 運作腳本 -->
<script>
let player = null;
const defaultFontSize = 24; // 調整預設的 70% 原始大小
let currentFontSize = defaultFontSize;

// 載入 YouTube API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    height: "360",
    width: "640",
    videoId: videoId,
    playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0, 'modestbranding': 1, 'origin': window.location.origin },
    events: { 'onReady': onPlayerReady }
  });
}

function onPlayerReady(event) { 
  initTimelineButtons();
  resetSubtitle();
  setInterval(videoLoop, 200); 
}

function videoLoop() {
  if(!player || typeof player.getCurrentTime !== 'function') return;
  const currentTime = player.getCurrentTime();
  updateSubtitle(currentTime);
}

// 更新字幕
function updateSubtitle(t){
  if (!subtitles || subtitles.length === 0) return;
  let text = "";
  for(let i = subtitles.length - 1; i >= 0; i--){
    const sub = subtitles[i];
    if(t >= sub.time){
      if(sub.endTime && t >= sub.endTime) { text = ""; } 
      else { text = sub.text; }
      break; 
    }
  }
  const subEl = document.getElementById("subtitle");
  if(text === "") { subEl.style.display = "none"; } 
  else { subEl.style.display = "block"; subEl.innerText = text; }
}

// 點擊跳轉時間
function jumpToTime(seconds) {
  if (player && typeof player.seekTo === 'function') {
    player.seekTo(seconds, true);
    if (player.getPlayerState() !== 1) player.playVideo();
  }
}

// 生成右側時間軸按鈕
function initTimelineButtons() {
  const container = document.getElementById("timeline-controls");
  if (!container || !timeLinks || timeLinks.length === 0) return;
  container.innerHTML = "";
  timeLinks.forEach(link => {
    const btn = document.createElement("button");
    btn.innerText = link.label;
    btn.style.cssText = "background: #333; color: white; border: 1px solid #444; padding: 12px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 14px; width: 100%; text-align: left;";
    btn.onmouseover = () => { btn.style.background = "var(--main-color)"; btn.style.borderColor = "var(--main-color)"; };
    btn.onmouseout = () => { btn.style.background = "#333"; btn.style.borderColor = "#444"; };
    btn.onclick = () => jumpToTime(link.seconds);
    container.appendChild(btn);
  });
}

// 字幕放大縮小功能
function adjustSubtitle(value) {
  const subEl = document.getElementById("subtitle");
  currentFontSize += value;
  if (currentFontSize < 12) currentFontSize = 12; // 限制最小不要小於 12px
  if (currentFontSize > 60) currentFontSize = 60; // 限制最大不要超過 60px
  subEl.style.fontSize = currentFontSize + "px";
}

// 字幕復原功能
function resetSubtitle() {
  const subEl = document.getElementById("subtitle");
  currentFontSize = defaultFontSize;
  subEl.style.fontSize = currentFontSize + "px";
}

// 進入全螢幕
function enterFullScreen() {
  const elem = document.getElementById("video-container");
  let req = elem.requestFullscreen || elem.webkitRequestFullscreen;
  if (req) req.call(elem);
}

// 離開全螢幕
function exitFullScreen() {
  let exit = document.exitFullscreen || document.webkitExitFullscreen;
  if (exit) exit.call(document);
}
</script>
</body>
</html>
