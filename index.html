<script>
// =========================================================================

// =========================================================================

// 1. YouTube 影片 ID（網址 watch?v= 後面那一串英文數字）
const videoId = "Daqs3ZZP_js"; 

// 2. 右側時間軸捷徑（顯示名稱、要跳轉的時間秒數）
const timeLinks = [
];

// 3. 影片字幕設定（如不需滾動字幕，保持空陣列 [] 即可）
const subtitles = [
  { time: 0, text: "今天是 ASEA\n出發前正在停車中" },
  { time: 2, text: "日本的味道" },
  { time: 4, text: "抵達啦" },

  { time: 16, text: "紅毯結束後狂拍 challenge 換完衣服啦" },
  { time: 18, text: "謝謝簽名專輯！！" },
  { time: 20, text: "ASEA 要開始啦" },
  { time: 21, text: "ASEA 結束啦  謝謝兩個獎" },

  { time: 31, text: "正在去機場..眼淚嘩啦啦.." },
  { time: 33, text: "究竟能不能全部吃完呢" },
  { time: 35, text: "飛機飛起來啦~" },

  { time: 39, text: "到公司了" },

  { time: 47, text: "正在健身" },
  { time: 49, text: "到延世啦 我愛你" },
  { time: 51, text: "到宿舍啦" },
];

</script>

<style>
/* 🎨 全域基礎樣式（深色背景） */
body { 
  background: #111; 
  color: white; 
  text-align: center; 
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
  margin: 0; 
  overflow-x: hidden; 
}

/* 🌟 主題顏色設定（可自由修改喜歡的按鈕顏色） */
:root { 
  --main-color: #5698c3; 
}

/* 🔝 標題區 */
#title { 
  font-size: 26px; 
  margin: 20px auto; 
  font-weight: bold; 
  line-height: 1.5; 
  max-width: 95%; 
}

/* 🎬 核心外層大框框：寬度限制為影片寬度，使其完美居中 */
#main-layout {
  position: relative;
  max-width: 640px; 
  margin: 0 auto;
  padding: 0 15px;
}

#video-wrapper { 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  width: 100%; 
}

/* 🎥 影片容器 */
#video-container { 
  position: relative; 
  width: 100%; 
  aspect-ratio: 16 / 9; 
  background: black; 
  border-radius: 10px; 
  overflow: hidden; 
}
#player, #player iframe { 
  width: 100%; 
  height: 100%; 
  display: block; 
}

/* 💬 浮動字幕樣式 */
#subtitle { 
  position: absolute; 
  bottom: 20px; 
  left: 50%; 
  transform: translateX(-50%); 
  font-size: 18px; 
  color: white; 
  background: rgba(0,0,0,0.7); 
  padding: 8px 14px; 
  border-radius: 8px; 
  white-space: pre-line; 
  max-width: 90%; 
  width: fit-content; 
  pointer-events: none; 
  z-index: 10; 
  line-height: 1.5; 
  display: none;
}

/* 🎯 底部控制列 */
#bottom-block { 
  width: 100%; 
  margin-top: 15px; 
  margin-bottom: 35px; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
}

#fullscreenBtn { 
  background: var(--main-color); 
  color: white; 
  border: none; 
  padding: 10px 30px; 
  border-radius: 6px; 
  cursor: pointer; 
  font-weight: bold; 
  transition: 0.3s; 
}
#fullscreenBtn:hover { 
  filter: brightness(1.2); 
}

/* 📜 【核心！】右側獨立時間軸選單（利用絕對定位移到你畫的紅框位置） */
#timeline-sidebar {
  position: absolute;
  left: 680px;      /* 將側欄推到置中影片的右側 (640px 影片 + 40px 間距) */
  top: 0;
  width: 280px;
  height: 360px;    /* 高度與影片等高 */
  background: #222;
  border-radius: 10px;
  padding: 15px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto; /* 超過高度自動出現滾動條 */
  text-align: left;
}

#sidebar-title {
  font-size: 16px;
  font-weight: bold;
  color: var(--main-color);
  margin-bottom: 5px;
  border-bottom: 1px solid #444;
  padding-bottom: 8px;
}
#timeline-controls {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* 📜 美化側欄滾動條 */
#timeline-sidebar::-webkit-scrollbar { width: 6px; }
#timeline-sidebar::-webkit-scrollbar-track { background: #222; }
#timeline-sidebar::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
#timeline-sidebar::-webkit-scrollbar-thumb:hover { background: var(--main-color); }

/* 📱 RWD 行動裝置自動適應（當螢幕寬度小於 1024px，選單會乖乖掉到影片下方，不擠壓排版） */
@media (max-width: 1024px) {
  #main-layout { max-width: min(95vw, 640px); }
  #timeline-sidebar {
    position: static; 
    width: 100%;
    height: auto;
    margin-top: 20px;
  }
}
</style>
</head>

<body>

<!-- 網頁標題 -->
<div id="title">ASEA + 延世大學校友會 Vlog - by LEO</div>

<!-- 主版面區塊 -->
<div id="main-layout">
  
  <!-- 左側/中央：影片主體 -->
  <div id="video-wrapper">
    <div id="video-container">
      <div id="player"></div>
      <div id="subtitle"></div>
    </div>
    
    <div id="bottom-block">
      <button id="fullscreenBtn" onclick="enterFullScreen()">全螢幕觀看</button>
    </div>
  </div>

  <!-- 右側：獨立時間軸（完全不影響影片置中） -->
  <div id="timeline-sidebar">
    <div id="sidebar-title">🕒 時間軸目錄</div>
    <div id="timeline-controls"></div>
  </div>

</div>

<!-- ⚙️ 核心 YouTube API 運作腳本（不用去動它） -->
<script>
let player = null;

// 載入 YouTube API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    height: "360",
    width: "640",
    videoId: videoId,
    playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0, 'modestbranding': 1, 'origin': window.location.origin },
    events: { 'onReady': onPlayerReady }
  });
}

function onPlayerReady(event) { 
  initTimelineButtons();
  setInterval(videoLoop, 200); 
}

function videoLoop() {
  if(!player || typeof player.getCurrentTime !== 'function') return;
  const currentTime = player.getCurrentTime();
  updateSubtitle(currentTime);
}

// 更新字幕
function updateSubtitle(t){
  if (!subtitles || subtitles.length === 0) return;
  let text = "";
  for(let i = subtitles.length - 1; i >= 0; i--){
    const sub = subtitles[i];
    if(t >= sub.time){
      if(sub.endTime && t >= sub.endTime) { text = ""; } 
      else { text = sub.text; }
      break; 
    }
  }
  const subEl = document.getElementById("subtitle");
  if(text === "") { subEl.style.display = "none"; } 
  else { subEl.style.display = "block"; subEl.innerText = text; }
}

// 點擊跳轉時間
function jumpToTime(seconds) {
  if (player && typeof player.seekTo === 'function') {
    player.seekTo(seconds, true);
    if (player.getPlayerState() !== 1) player.playVideo();
  }
}

// 生成右側時間軸按鈕
function initTimelineButtons() {
  const container = document.getElementById("timeline-controls");
  if (!container || !timeLinks || timeLinks.length === 0) return;
  container.innerHTML = "";
  timeLinks.forEach(link => {
    const btn = document.createElement("button");
    btn.innerText = link.label;
    btn.style.cssText = "background: #333; color: white; border: 1px solid #444; padding: 12px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 14px; width: 100%; text-align: left;";
    btn.onmouseover = () => { btn.style.background = "var(--main-color)"; btn.style.borderColor = "var(--main-color)"; };
    btn.onmouseout = () => { btn.style.background = "#333"; btn.style.borderColor = "#444"; };
    btn.onclick = () => jumpToTime(link.seconds);
    container.appendChild(btn);
  });
}

// 全螢幕功能
function enterFullScreen() {
  const elem = document.getElementById("video-container");
  let req = elem.requestFullscreen || elem.webkitRequestFullscreen;
  if (req) req.call(elem);
}
</script>
</body>
</html>
